name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main

jobs:
  # ЭТАП 1: ТАМОЖНЯ (CI)
  test-and-lint:
    runs-on: self-hosted
    steps:
      - name: 📥 Клонирование репозитория
        uses: actions/checkout@v4

      - name: 🐍 Установка Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Установка Poetry
        run: pip install poetry

      - name: 🛠️ Установка зависимостей
        run: poetry install --no-root

      - name: 🧹 Проверка линтером (Ruff)
        run: poetry run ruff check .

      - name: 🧪 Запуск тестов (Pytest)
        env:
          PYTHONPATH: .
        run: poetry run python -m pytest tests/ -v

  deploy:
    needs: test-and-lint
    runs-on: self-hosted
    steps:
      - name: 🚀 Перезапуск бота
        run: |
          cd /home/nekoneki/TgBotBadWordsCheker 
          git pull
          docker compose up -d --build